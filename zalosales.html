<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC MONITOR V1.13</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .app-header { background: #0068ff; color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .msg-item { background: white; border-radius: 8px; padding: 12px; margin: 10px; border-left: 5px solid #0068ff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-sender { font-weight: bold; color: #0068ff; }
        .msg-time { font-size: 0.7rem; color: #888; }
    </style>
</head>
<body>
    <div class="app-header">
        <h5>VDC MONITOR V1.13</h5>
        <input type="text" id="kw-input" class="form-control form-control-sm mt-2" placeholder="Từ khóa...">
        <button onclick="saveKW()" class="btn btn-warning btn-sm mt-2 w-100">Cập nhật bộ lọc</button>
    </div>
    <div id="msg-box"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
            authDomain: "tavietnam-78ae8.firebaseapp.com",
            projectId: "tavietnam-78ae8",
            storageBucket: "tavietnam-78ae8.firebasestorage.app",
            messagingSenderId: "670121705534",
            appId: "1:670121705534:web:1027ad98550573ad37116f",
            databaseURL: "https://tavietnam-78ae8-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('messages').orderByChild('timestamp').limitToLast(20).on('child_added', (snap) => {
            const v = snap.val();
            const html = `<div class="msg-item">
                <div class="d-flex justify-content-between"><span class="msg-time">${v.group}</span><span class="msg-time">${v.time}</span></div>
                <div class="msg-sender">${v.sender}</div>
                <div style="white-space:pre-wrap">${v.content}</div>
            </div>`;
            document.getElementById('msg-box').insertAdjacentHTML('afterbegin', html);
        });

        function saveKW() {
            db.ref('settings').set({ keywords: document.getElementById('kw-input').value });
            alert("Đã lưu!");
        }
    </script>
</body>
</html>
