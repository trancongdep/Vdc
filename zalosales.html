<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC MONITOR V1.6</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .header { background: #0068ff; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 10px; }
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-left: 6px solid #e74c3c; position: relative; }
        .group-name { color: #888; font-size: 0.75rem; margin-bottom: 4px; font-weight: bold; }
        .sender-name { font-weight: bold; color: #1c1e21; font-size: 1.1rem; margin-bottom: 8px; display: block; }
        .full-content { background: #fff5f5; padding: 12px; border-radius: 8px; color: #000; font-size: 1rem; border: 1px solid #ffdada; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .time-stamp { font-size: 0.7rem; color: #999; position: absolute; top: 15px; right: 15px; }
        #btn-audio { width: 100%; padding: 15px; background: #ff9800; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0">HỆ THỐNG GIÁM SÁT V1.6</h3>
</div>

<button id="btn-audio" onclick="activateAlarm()">🔔 BẬT CHUÔNG THÔNG BÁO</button>

<div id="display-list"></div>

<audio id="sound-effect" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const sound = document.getElementById('sound-effect');
    let isAlarmOn = false;
    let initial = true;

    function activateAlarm() {
        isAlarmOn = true;
        sound.play().then(() => sound.pause());
        document.getElementById('btn-audio').innerText = "✅ ĐANG GIÁM SÁT CÓ CHUÔNG";
        document.getElementById('btn-audio').style.background = "#4caf50";
    }

    database.ref('messages').limitToLast(10).on('value', (snapshot) => {
        const container = document.getElementById('display-list');
        container.innerHTML = "";
        const val = snapshot.val();
        
        if (val) {
            const sorted = Object.keys(val).map(k => val[k]).reverse();
            sorted.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <span class="time-stamp">${item.time}</span>
                        <div class="group-name">📍 Nguồn: ${item.group}</div>
                        <span class="sender-name">👤 ${item.sender}</span>
                        <div class="full-content">${item.content}</div>
                    </div>
                `;
            });

            if (!initial && isAlarmOn) { sound.play(); }
            initial = false;
        }
    });
</script>
</body>
</html>
