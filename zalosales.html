<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC ZALO SALES V1.3</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #e9ebee; padding: 10px; margin: 0; }
        .header { background: #0068ff; color: white; padding: 15px; text-align: center; border-radius: 10px; }
        .card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #0068ff; }
        .sender { font-weight: bold; color: #0068ff; }
        .time { font-size: 0.8em; color: gray; float: right; }
        .msg { margin-top: 5px; color: #333; }
        #btn-audio { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; background: #ff9800; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0">VDC ZALO SALES MONITOR</h3>
    <small>Version 1.3 - Đồng bộ Firebase</small>
</div>

<button id="btn-audio" onclick="enableSound()">🔔 KÍCH HOẠT CHUÔNG BÁO</button>

<div id="list"></div>

<audio id="ting" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ting = document.getElementById('ting');
    let soundEnabled = false;
    let firstLoad = true;

    function enableSound() {
        soundEnabled = true;
        ting.play().then(() => ting.pause());
        document.getElementById('btn-audio').innerText = "✅ CHUÔNG ĐÃ SẴN SÀNG";
        document.getElementById('btn-audio').style.background = "#4caf50";
    }

    // ĐỌC DỮ LIỆU TỪ NHÁNH 'messages'
    db.ref('messages').limitToLast(15).on('value', (snapshot) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        
        if (data) {
            const arr = Object.keys(data).map(k => data[k]).reverse();
            arr.forEach(m => {
                listDiv.innerHTML += `
                    <div class="card">
                        <span class="time">${m.time}</span>
                        <div class="sender">${m.sender}</div>
                        <div class="msg">${m.content}</div>
                    </div>
                `;
            });

            if (!firstLoad && soundEnabled) { ting.play(); }
            firstLoad = false;
        }
    });
</script>
</body>
</html>
