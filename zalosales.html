<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC MONITOR - Hệ thống giám sát Zalo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-panel { background: #0068ff; color: white; padding: 20px; border-radius: 0 0 15px 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-msg { transition: transform 0.2s; border-left: 5px solid #0068ff; margin-bottom: 10px; }
        .card-msg:hover { transform: scale(1.01); }
        .badge-time { font-size: 0.8rem; color: #666; }
        .content-text { white-space: pre-wrap; word-wrap: break-word; }
        .version-tag { font-size: 12px; opacity: 0.7; float: right; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="header-panel text-center">
        <h1>VDC MONITOR</h1>
        <p>Bản quyền phát triển: VDC - Trần Công Đẹp <span class="version-tag">Version 1.11</span></p>
        
        <div class="row g-2 justify-content-center mt-3">
            <div class="col-md-6">
                <input type="text" id="keyword-input" class="form-control" placeholder="Nhập từ khóa (cách nhau bằng dấu phẩy)...">
            </div>
            <div class="col-auto">
                <button onclick="updateKeywords()" class="btn btn-warning">Cập nhật Từ khóa</button>
            </div>
        </div>
    </div>

    <div class="row px-3">
        <div class="col-12 mb-3 d-flex justify-content-between align-items-center">
            <h5>Danh sách tin nhắn lọc được:</h5>
            <button onclick="clearLogs()" class="btn btn-sm btn-outline-danger">Xóa dữ liệu cũ</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm rounded">
                <thead class="table-primary">
                    <tr>
                        <th style="width: 15%;">Nhóm</th>
                        <th style="width: 15%;">Người gửi</th>
                        <th style="width: 15%;">Thời gian</th>
                        <th style="width: 55%;">Nội dung</th>
                    </tr>
                </thead>
                <tbody id="message-list"></tbody>
            </table>
        </div>
    </div>
</div>

<audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f",
        databaseURL: "https://tavietnam-78ae8-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('messages').orderByChild('timestamp').limitToLast(20).on('child_added', (snapshot) => {
        const data = snapshot.val();
        renderMessage(data);
        playAlarm();
    });

    function renderMessage(data) {
        const tbody = document.getElementById('message-list');
        const row = `
            <tr class="card-msg">
                <td><strong>${data.group}</strong></td>
                <td><span class="text-primary">${data.sender}</span></td>
                <td><span class="badge-time">${data.time}</span></td>
                <td class="content-text">${data.content}</td>
            </tr>
        `;
        tbody.insertAdjacentHTML('afterbegin', row);
    }

    function updateKeywords() {
        const kws = document.getElementById('keyword-input').value;
        db.ref('settings').update({ keywords: kws });
        alert("Đã cập nhật bộ lọc!");
    }

    function playAlarm() {
        const audio = document.getElementById('alarm-sound');
        audio.play().catch(e => {});
    }

    function clearLogs() {
        if(confirm("Xóa tất cả lịch sử giám sát?")) {
            db.ref('messages').remove();
            location.reload();
        }
    }

    db.ref('settings/keywords').once('value', (s) => {
        if(s.val()) document.getElementById('keyword-input').value = s.val();
    });
</script>
</body>
</html>
